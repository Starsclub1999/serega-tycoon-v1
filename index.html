    let currentStageIndex = 0, score = 0, baseCps = 0, globalMultiplier = 1, audioCtx, isAudioPlaying = false, gameInterval;

    window.onload = function() {
        if (localStorage.getItem('seregaSave')) document.getElementById('continue-btn').style.display = 'inline-block';
    };

    function getSaveObj() {
        return {
            currentStageIndex, score, globalMultiplier,
            upgrades: gameStages.map(stage => stage.upgrades.map(u => u.count || 0))
        };
    }

    function saveGameLocal() {
        try { localStorage.setItem('seregaSave', JSON.stringify(getSaveObj())); } catch(e) { console.warn("Save failed", e); }
    }

    function applySave(data) {
        currentStageIndex = data.currentStageIndex || 0;
        score = data.score || 0;
        globalMultiplier = data.globalMultiplier || 1;
        if (data.upgrades) {
            data.upgrades.forEach((stageUpgrades, i) => {
                if (gameStages[i]) stageUpgrades.forEach((count, j) => { if (gameStages[i].upgrades[j]) gameStages[i].upgrades[j].count = count; });
            });
        }
        setupStageUI(currentStageIndex);
        calculateCPS();
        renderUpgrades();
        updateUI();
        addLog(`Игра загружена. Эпоха: ${currentStage.name}`, 'system');
    }

    function exportSave() {
        const blob = new Blob([JSON.stringify(getSaveObj())], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `serega_save_${currentStageIndex + 1}.json`;
        a.click();
        addLog('Файл сохранения скачан.', 'system');
    }

    function importSave(event) {
        const reader = new FileReader();
        reader.onload = e => { try { applySave(JSON.parse(e.target.result)); } catch(err) { alert("Ошибка файла!"); } };
        reader.readAsText(event.target.files[0]);
    }

    function resetGame() { if (confirm("Начать заново?")) { localStorage.removeItem('seregaSave'); location.reload(); } }

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playBGM() {
        if (isAudioPlaying) return; isAudioPlaying = true;
        const notes = [220.00, 261.63, 329.63, 293.66]; let ni = 0;
        setInterval(() => {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(notes[ni], audioCtx.currentTime);
            g.gain.setValueAtTime(0, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.5);
            g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2.0);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 2.0);
            ni = (ni + 1) % notes.length;
        }, 2000);
    }

    function playClickSound() {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(100 + (currentStageIndex * 50), audioCtx.currentTime);
        g.gain.setValueAtTime(0.2, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function addLog(text, type = 'normal') {
        const logPanel = document.getElementById('chat-panel'), entry = document.createElement('div');
        entry.className = `chat-entry ${type}`;
        entry.innerText = (type.includes('system') ? "[СИСТЕМА] " : "> ") + text;
        logPanel.appendChild(entry);
        if (logPanel.children.length > 7) logPanel.removeChild(logPanel.firstChild);
        logPanel.scrollTop = logPanel.scrollHeight;
    }

    function startGame(loadLocal) {
        document.getElementById('start-overlay').style.display = 'none';
        initAudio(); playBGM();
        if (loadLocal && localStorage.getItem('seregaSave')) applySave(JSON.parse(localStorage.getItem('seregaSave')));
        else loadStage(0);
        gameInterval = setInterval(gameLoop, 100);
        setInterval(() => { if (currentStage) addLog(currentStage.logs[Math.floor(Math.random() * currentStage.logs.length)]); }, 8000);
        setInterval(() => { saveGameLocal(); addLog('Автосохранение.', 'system'); }, 30000);
    }

    function setupStageUI(index) {
        currentStageIndex = index; currentStage = gameStages[index];
        document.getElementById('stats-area-container').innerHTML = `
            <h2 id="stage-name" style="color:var(--stage-color);">${currentStage.name}</h2>
            <h1 id="score">0</h1>
            <p id="cps">0 <span id="currency-name">${currentStage.currency}</span>/сек</p>
            <p style="color:var(--success);">Множитель: x<span id="mult-val">${globalMultiplier}</span></p>
        `;
        document.getElementById('clicker-container').innerHTML = `<div id="clicker-btn" onclick="clickMain()" style="background-color:${currentStage.btnColor};"><span id="btn-text-span">${currentStage.btnText}</span></div>`;
        document.getElementById('upgrades-header-container').innerHTML = `<h2 id="upgrades-title">${currentStage.uiTitle}</h2>`;
        document.getElementById('left-panel').style.borderRightColor = currentStage.btnColor;
    }

    function loadStage(index) {
        score = 0; baseCps = 0;
        gameStages[index].upgrades.forEach(u => u.count = 0);
        setupStageUI(index);
        addLog(`Эпоха: ${currentStage.name}`, 'system');
        renderUpgrades(); updateUI(); saveGameLocal();
    }

    function clickMain() { score += (currentStageIndex + 1) * 2 * globalMultiplier; playClickSound(); updateUI(); }

    function buyUpgrade(idx) {
        const u = currentStage.upgrades[idx], cost = Math.floor(u.cost * Math.pow(1.15, u.count || 0));
        if (score >= cost) {
            score -= cost;
            if (u.isTransition) {
                if (currentStageIndex === 5) { clearInterval(gameInterval); document.getElementById('end-overlay').style.display = 'flex'; }
                else { globalMultiplier++; setTimeout(() => loadStage(currentStageIndex + 1), 500); }
            } else {
                u.count = (u.count || 0) + 1; addLog(`Куплено: ${u.name}`);
                calculateCPS(); renderUpgrades(); updateUI();
            }
        }
    }

    function calculateCPS() { baseCps = 0; currentStage.upgrades.forEach(u => { if (!u.isTransition) baseCps += u.cps * (u.count || 0); }); }
    function gameLoop() { if (baseCps > 0) score += (baseCps * globalMultiplier) / 10; updateUI(); }

    function updateUI() {
        document.getElementById('score').innerText = Math.floor(score).toLocaleString('ru-RU');
        document.getElementById('cps').innerText = `${Math.floor(baseCps * globalMultiplier).toLocaleString('ru-RU')} ${currentStage.currency}/сек`;
        currentStage.upgrades.forEach((u, i) => {
            const el = document.getElementById(`upg-${i}`);
            if (el) {
                const cost = Math.floor(u.cost * Math.pow(1.15, u.count || 0));
                el.querySelector('.cost-val').innerText = cost.toLocaleString('ru-RU');
                if (score >= cost) el.classList.remove('disabled'); else el.classList.add('disabled');
            }
        });
    }

    function renderUpgrades() {
        const cont = document.getElementById('upgrades-container'); cont.innerHTML = '';
        currentStage.upgrades.forEach((u, i) => {
            const cost = Math.floor(u.cost * Math.pow(1.15, u.count || 0));
            const div = document.createElement('div');
            div.className = `upgrade-card disabled ${u.isTransition ? 'transition-btn' : ''}`;
            div.id = `upg-${i}`; div.onclick = () => buyUpgrade(i);
            div.innerHTML = `<div class="upgrade-info"><h3>${u.name}${u.isTransition?'':' (x'+(u.count||0)+')'}</h3><p>${u.desc}</p><p style="color:#aaa;font-size:0.8rem;margin-top:5px;">${u.isTransition?'КЛЮЧ':'+'+(u.cps*globalMultiplier).toLocaleString()+'/сек'}</p></div><div class="upgrade-cost"><span><span class="cost-val">${cost.toLocaleString()}</span></span></div>`;
            cont.appendChild(div);
        });
    }
</script>
</body>
</html>
